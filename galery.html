<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre-Dame Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=EB+Garamond:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #D3DAD9;
            font-family: 'EB Garamond', serif;
        }

        .navbar {
            background-color: #37353E;
        }

        .navbar-brand {
            font-size: 1.5em;
            font-weight: bold;
            font-family: 'UnifrakturMaguntia', cursive;
        }

        header {
            background-color: #44444E;
            color: white;
            padding: 60px 20px;
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
            font-family: 'UnifrakturMaguntia', cursive;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
            font-family: 'EB Garamond', serif;
        }

        .gallery-item {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border: 2px solid #715A5A;
        }

        .gallery-item img {
            height: 280px;
            object-fit: cover;
            border-radius: 8px;
            width: 100%;
        }

        .card {
            border: 2px solid #715A5A;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            background-color: #D3DAD9;
        }

        footer {
            background-color: #37353E;
            color: #D3DAD9;
            text-align: center;
            padding: 30px 20px;
            margin-top: 60px;
            font-family: 'EB Garamond', serif;
        }

        .gallery-container {
            padding: 0 15px;
        }

        .modal-body {
            padding: 0;
            background-color: #44444E;
        }

        .modal-body img {
            width: 100%;
            height: auto;
            max-height: 90vh;
            object-fit: contain;
        }

        .modal-header {
            background-color: #44444E;
            border-bottom: 1px solid #715A5A;
        }

        .btn-close {
            filter: invert(1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Notre-Dame</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="landing">Kezdőlap</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="galery.html">Galéria</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="tortenete.html">Történet</a>
                    </li>
                    <li class="nav-item">
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header>
        <h1>Notre-Dame Galéria
    </header>

    <div class="container gallery-container">
        <div class="row g-4">
            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="dolcece-church-841672.jpg" class="card-img-top" alt="Grand Facade">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="guy_dugas-reims-4851950.jpg" class="card-img-top" alt="Interior View">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notre-dame-de-paris-announces-reopening-date-and-proposes-constroversial-entrance-fee_2.jpg" class="card-img-top" alt="Rose Window">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame.png" class="card-img-top" alt="Bell Towers">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame1.png" class="card-img-top" alt="Flying Buttresses">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame2.png" class="card-img-top" alt="Night View">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame3.png" class="card-img-top" alt="Stained Glass">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame4.png" class="card-img-top" alt="Gargoyles">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame5.png" class="card-img-top" alt="Main Portal">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="user1469083764-napoleon-1948529.png"card-img-top" alt="Choir Loft">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame7.png" class="card-img-top" alt="Ribbed Vaults">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="winpod-notre-dame-2708524.jpg" class="card-img-top" alt="Sculptural Details">
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for fullscreen image -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <img id="modalImage" src="" alt="Fullscreen Image">
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p> Készítette Csecsur Áron és Magyari Áron.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showImage(element) {
            const img = element.querySelector('img');
            const src = img.src;
            const alt = img.alt;
            document.getElementById('modalImage').src = src;
            document.getElementById('modalImage').alt = alt;
        }
    </script>
</body>
</html>
