</head>
<body>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

    <header>
        <h1>Notre-Dame Galéria
    </header>

    <div class="container gallery-container">
        <div class="row g-4">
            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="dolcece-church-841672.jpg" class="card-img-top" alt="Grand Facade">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="guy_dugas-reims-4851950.jpg" class="card-img-top" alt="Interior View">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notre-dame-de-paris-announces-reopening-date-and-proposes-constroversial-entrance-fee_2.jpg" class="card-img-top" alt="Rose Window">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame.png" class="card-img-top" alt="Bell Towers">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame1.png" class="card-img-top" alt="Flying Buttresses">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame2.png" class="card-img-top" alt="Night View">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame3.png" class="card-img-top" alt="Stained Glass">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame4.png" class="card-img-top" alt="Gargoyles">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame5.png" class="card-img-top" alt="Main Portal">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="user1469083764-napoleon-1948529.png"card-img-top" alt="Choir Loft">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="notredame7.png" class="card-img-top" alt="Ribbed Vaults">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card gallery-item" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="showImage(this)">
                    <img src="winpod-notre-dame-2708524.jpg" class="card-img-top" alt="Sculptural Details">
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for fullscreen image -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="carousel-container">
                        <button class="carousel-btn prev" onclick="prevImage()">&#10094;</button>
                        <img id="modalImage" src="" alt="Fullscreen Image">
                        <button class="carousel-btn next" onclick="nextImage()">&#10095;</button>
                    </div>
                    <div class="image-counter">
                        <span id="currentImage">1</span> / <span id="totalImages">12</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p> Készítette Csecsur Áron és Magyari Áron.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentImageIndex = 0;
        const galleryImages = [
            { src: 'dolcece-church-841672.jpg', alt: 'Grand Facade' },
            { src: 'guy_dugas-reims-4851950.jpg', alt: 'Interior View' },
            { src: 'notre-dame-de-paris-announces-reopening-date-and-proposes-constroversial-entrance-fee_2.jpg', alt: 'Rose Window' },
            { src: 'notredame.png', alt: 'Bell Towers' },
            { src: 'notredame1.png', alt: 'Flying Buttresses' },
            { src: 'notredame2.png', alt: 'Night View' },
            { src: 'notredame3.png', alt: 'Stained Glass' },
            { src: 'notredame4.png', alt: 'Gargoyles' },
            { src: 'notredame5.png', alt: 'Main Portal' },
            { src: 'user1469083764-napoleon-1948529.png', alt: 'Choir Loft' },
            { src: 'notredame7.png', alt: 'Ribbed Vaults' },
            { src: 'winpod-notre-dame-2708524.jpg', alt: 'Sculptural Details' }
        ];

        function showImage(element) {
            const img = element.querySelector('img');
            const src = img.src;
            const alt = img.alt;
            
            currentImageIndex = galleryImages.findIndex(image => image.src === src);
            updateModalImage();
        }

        function updateModalImage() {
            const image = galleryImages[currentImageIndex];
            document.getElementById('modalImage').src = image.src;
            document.getElementById('modalImage').alt = image.alt;
            document.getElementById('currentImage').textContent = currentImageIndex + 1;
            document.getElementById('totalImages').textContent = galleryImages.length;
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
            updateModalImage();
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
            updateModalImage();
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(event) {
            const modal = document.getElementById('imageModal');
            if (modal.classList.contains('show')) {
                if (event.key === 'ArrowRight') nextImage();
                if (event.key === 'ArrowLeft') prevImage();
            }
        });
    </script>
</body>
</html>
